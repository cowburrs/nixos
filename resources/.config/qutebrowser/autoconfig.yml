# If a config.py file exists, this file is ignored unless it's explicitly loaded
# via config.load_autoconfig(). For more information, see:
# https://github.com/qutebrowser/qutebrowser/blob/main/doc/help/configuring.asciidoc#loading-autoconfigyml
# DO NOT edit this file by hand, qutebrowser will overwrite it.
# Instead, create a config.py - see :help for details.

config_version: 2
settings:
  bindings.commands:
    global:
      command:
        <Ctrl+n>: completion-item-focus next
        <Ctrl+p>: completion-item-focus prev
        <Ctrl+y>: completion-item-focus next ;; command-accept
      normal:
        Q: macro-record
        j: 'jseval -q window.location.host.includes(''google.com'') || window.location.host.includes(''duckduckgo.com'')
          ? qute.run(''scroll down ;; scroll down ;; scroll down'') : qute.run(''scroll
          down'')'
        k: 'jseval -q window.location.host.includes(''google.com'') || window.location.host.includes(''duckduckgo.com'')
          ? qute.run(''scroll up ;; scroll up ;; scroll up'') : qute.run(''scroll
          up'')'
        q: null
